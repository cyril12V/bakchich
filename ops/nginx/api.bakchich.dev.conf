# =============================================================================
#  Bakchich — vhost nginx : api.bakchich.dev  — reverse-proxy pur, durci
#  -------------------------------------------------------------------------
#  Aucun fichier statique : tout part vers le backend Node (127.0.0.1:3939).
#  C'est l'URL (BASE_URL) consommée par l'extension VS Code ET les webhooks
#  Stripe + le callback OAuth Google.
#
#  IMPORTANT — on NE bloque PAS ici les User-Agent vides : le `fetch` de Node
#  (extension) n'envoie pas d'UA. On filtre seulement les scanners (bkch_bad_bot).
#  Pré-certbot : écoute en 80 ; certbot bascule en 443 ssl.
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.bakchich.dev;

    # Scanners/outils offensifs uniquement.
    if ($bkch_bad_bot) { return 403; }
    # Méthodes utiles à l'API (GET state/balance, POST events/campaigns/webhooks).
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) { return 405; }

    # En-têtes de sécurité (l'API renvoie du JSON ; helmet ajoute sa propre CSP).
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 4m;
    limit_conn bkch_conn 20;

    # Doublons : on masque les en-têtes du backend (helmet) que nginx ré-émet
    # → nginx devient l'unique source pour ces 4 en-têtes (pas de conflit).
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header Referrer-Policy;

    # Challenge ACME (fallback webroot pour les renouvellements).
    location /.well-known/acme-challenge/ { root /var/www/bakchich/web/dist; }

    # Webhooks Stripe : pas de rate-limit (retries Stripe légitimes).
    location /webhooks/ {
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth OAuth : rate-limit strict.
    location /auth/ {
        limit_req zone=bkch_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Liens de clic.
    location /c/ {
        limit_req zone=bkch_click burst=20 nodelay;
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tout le reste de l'API.
    location / {
        limit_req zone=bkch_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
