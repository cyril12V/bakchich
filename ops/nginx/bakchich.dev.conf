# =============================================================================
#  Bakchich : vhost nginx : bakchich.dev (+ www)  : site web public, durci
#  -------------------------------------------------------------------------
#  Sert le build React (Vite) depuis /var/www/bakchich/web/dist (webroot DÉDIÉ,
#  séparé du code backend → ni .env ni .db ne peuvent fuiter par le web).
#  Proxifie SAME-ORIGIN vers le backend Node (127.0.0.1:3939) les chemins
#  applicatifs : /api/ /auth/ /c/ /webhooks/  → zéro CORS.
#
#  Pré-certbot : écoute en 80. `certbot --nginx` duplique ce bloc en 443 ssl,
#  ajoute la redirection 80→443 et les directives SSL (# managed by certbot).
#  Zones de rate-limit + map anti-bots : voir conf.d/bakchich-zones.conf.
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name bakchich.dev www.bakchich.dev;

    root /var/www/bakchich/web/dist;
    index index.html;

    # --- Filtrage scanners/outils offensifs ---------------------------------
    if ($bkch_bad_bot) { return 403; }

    # --- Méthodes HTTP autorisées (le reste → 405) --------------------------
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) { return 405; }

    # --- En-têtes de sécurité (appliqués à toutes les réponses) -------------
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP : tout en self ; Google Fonts autorisé ; redirections Stripe Checkout
    # (navigation top-level) autorisées via form-action. Pas d'inline JS.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; form-action 'self' https://checkout.stripe.com; frame-src https://checkout.stripe.com; upgrade-insecure-requests" always;

    # Protection fichiers sensibles (défense en profondeur, même si webroot=dist).
    include /etc/nginx/snippets/security-common.conf;

    client_max_body_size 4m;        # créas annonceurs (icône base64 ≤ ~90 Ko)
    limit_conn bkch_conn 20;        # max 20 connexions simultanées / IP

    # Doublons : on masque les en-têtes du backend (helmet) que nginx ré-émet.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header Referrer-Policy;

    # www → apex (en HTTPS une fois certbot passé).
    if ($host = www.bakchich.dev) { return 301 https://bakchich.dev$request_uri; }

    # --- Assets versionnés (hash dans le nom) : cache immuable long ----------
    # (uniquement `expires` → conserve l'héritage des en-têtes de sécurité)
    location /assets/ {
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # --- Chemins applicatifs proxifiés vers le backend Node -----------------
    location /api/ {
        limit_req zone=bkch_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /auth/ {
        limit_req zone=bkch_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /c/ {
        limit_req zone=bkch_click burst=20 nodelay;
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Liens de clic courts : /go/<campagne>/<code> (même backend que /c/).
    location /go/ {
        limit_req zone=bkch_click burst=20 nodelay;
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Webhooks Stripe : pas de rate-limit (Stripe retente), corps brut côté backend.
    location /webhooks/ {
        proxy_pass http://127.0.0.1:3939;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA React : sert l'asset si présent, sinon index.html --------------
    location / {
        limit_req zone=bkch_web burst=60 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
